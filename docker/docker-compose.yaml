services:
  gateway:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    volumes:
      - ${DATA_DIR:-./.data}:/app/.data
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://gateway:8001
    depends_on:
      - gateway
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
      - frontend
    restart: unless-stopped
