name: Bug Report
description: Something is broken or behaving unexpectedly.
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact commands or steps to trigger the issue.
      placeholder: |
        1. Run `uv run ai-research-engineer "..." --mode orchestrated`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error messages or stack traces here.
      render: shell

  - type: dropdown
    id: mode
    attributes:
      label: Which mode?
      options:
        - orchestrated
        - simple
        - evolve
        - Not applicable / unsure

  - type: input
    id: version
    attributes:
      label: Archimedes version / commit
      placeholder: "e.g. v0.1.0 or git commit SHA"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.12.3"
